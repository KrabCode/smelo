<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equity Kalkulačka — ŠMELO.CZ</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<link rel="stylesheet" href="../base.css">
<link rel="stylesheet" href="style.css">
<script data-goatcounter="https://smelo.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="container">
  <h1 style="text-align:center;font-family:'Staatliches',sans-serif;letter-spacing:4px;margin:24px 0 16px;">
    <a href="../" style="color:#888;text-decoration:none;">←</a>
    EQUITY
  </h1>
  <div class="section">
    <div class="section-label">Board</div>
    <div id="boardRow" class="board-row">
      <div class="board-group" data-group="flop"></div>
      <div class="board-group" data-group="turn"></div>
      <div class="board-group" data-group="river"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">
      Hráči
      <span style="margin-left:auto;display:inline-flex;gap:6px;align-items:center;">
        <button id="removePlayer" class="round-btn" aria-label="Méně hráčů">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <span id="playerCount" style="min-width:1.5em;text-align:center;">2</span>
        <button id="addPlayer" class="round-btn" aria-label="Více hráčů">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </span>
    </div>
    <div id="playersList"></div>
  </div>

  <div class="status-row">
    <span id="statusBadge" class="status-badge"></span>
    <div id="progressBar" class="progress-bar"><div id="progressFill"></div></div>
  </div>

  <div style="text-align:center;margin:16px 0;">
    <button id="resetBtn" class="reset-btn">Vymazat</button>
  </div>
</div>

<div id="cardPicker" class="picker-overlay" hidden>
  <div class="picker-modal">
    <div class="picker-header">
      <div id="pickerTitle">Vyber kartu</div>
      <button id="pickerClose" class="picker-close">✕</button>
    </div>
    <div id="pickerGrid" class="picker-grid"></div>
    <button id="pickerClear" class="picker-clear">Smazat kartu</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
